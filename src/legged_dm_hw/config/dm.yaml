# Control loop parameters (read by DmHWLoop under namespace "damiao")
damiao:
  loop_frequency: 500
  cycle_time_error_threshold: 0.002
  thread_priority: 95

# legged_dm_hw node private parameters
legged_dm_hw:
  power_limit: 6
  contact_threshold: 200

  # Serial/USB-CAN ports
  # Adjust port and baudrate to match your hardware.
  serials:
    can0:
      port: /dev/ttyACM0
      baudrate: 921600

  # DM motor mapping: joint name -> CAN configuration
  # direction: +1 or -1 (motor-to-joint sign convention)
  # Adjust can_id values to match your motor CAN IDs.
  dm_actuators:
    leg_l1_joint:
      port: /dev/ttyACM0
      type: DM4340
      can_id: 0x06
      mst_id: 0x16
      direction: 1
    leg_l2_joint:
      port: /dev/ttyACM0
      type: DM4340
      can_id: 0x07
      mst_id: 0x17
      direction: 1
    leg_l3_joint:
      port: /dev/ttyACM0
      type: DM4340
      can_id: 0x08
      mst_id: 0x18
      direction: 1
    leg_l4_joint:
      port: /dev/ttyACM0
      type: DM4340
      can_id: 0x09
      mst_id: 0x19
      direction: 1
    leg_l5_joint:
      port: /dev/ttyACM0
      type: DM4340
      can_id: 0x10
      mst_id: 0x20
      direction: 1
    leg_r1_joint:
      port: /dev/ttyACM0
      type: DM4340
      can_id: 0x05
      mst_id: 0x15
      direction: 1
    leg_r2_joint:
      port: /dev/ttyACM0
      type: DM4340
      can_id: 0x04
      mst_id: 0x14
      direction: 1
    leg_r3_joint:
      port: /dev/ttyACM0
      type: DM4340
      can_id: 0x03
      mst_id: 0x13
      direction: 1
    leg_r4_joint:
      port: /dev/ttyACM0
      type: DM4340
      can_id: 0x02
      mst_id: 0x12
      direction: 1
    leg_r5_joint:
      port: /dev/ttyACM0
      type: DM4340
      can_id: 0x01
      mst_id: 0x11
      direction: 1